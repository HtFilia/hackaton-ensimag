name: Validation publique

on:
  push:
    branches: ["**"]

jobs:
  validate:
    name: Tests publics — Paliers 1 à 6
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests publics
        env:
          # Sur une branche d'équipe, filtrer sur cette équipe uniquement
          HACKATHON_TEAM: ${{ github.ref_name != 'master' && github.ref_name || '' }}
        run: |
          set +e
          OUTPUT=$(python3 -m pytest tests/levels/ -v --tb=line 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"

          # Exit 5 = aucun test collecté (équipe fraîche ou branche master sans équipe active)
          [ $EXIT -eq 5 ] && exit 0

          # Succès complet
          [ $EXIT -eq 0 ] && exit 0

          # Échecs : ignorer les NotImplementedError (paliers non encore implémentés)
          REAL_FAILURES=$(echo "$OUTPUT" | grep "^FAILED" | grep -v "NotImplementedError")
          if [ -z "$REAL_FAILURES" ]; then
            echo ""
            echo "⚠ Certains paliers ne sont pas encore implémentés (NotImplementedError) — CI verte."
            exit 0
          fi

          echo ""
          echo "✗ Des tests échouent (hors paliers non implémentés) :"
          echo "$REAL_FAILURES"
          exit 1

      - name: Résumé des résultats
        if: always()
        run: |
          echo "### Résultats des tests publics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref_name }}" != "master" ]; then
            echo "Équipe testée : \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Les tests privés (notation officielle) sont exécutés sur la machine des organisateurs." >> $GITHUB_STEP_SUMMARY
